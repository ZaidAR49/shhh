<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333333;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
      direction: rtl;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid #eaeaea;
    }
    .header {
      background-color: #000000;
      padding: 30px 40px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 24px;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .header p {
      color: #a1a1aa;
      margin: 8px 0 0 0;
      font-size: 14px;
    }
    .content {
      padding: 40px;
    }
    .content h2 {
      margin-top: 0;
      color: #18181b;
      font-size: 22px;
    }
    .content p {
      color: #52525b;
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.8;
    }
    .alert-box {
      font-size: 15px;
      color: #18181b;
      background-color: #f4f4f5;
      padding: 20px;
      border-radius: 6px;
      margin-top: 30px;
      border-right: 4px solid #000000;
    }
    .footer {
      background-color: #fafafa;
      padding: 20px 40px;
      text-align: center;
      border-top: 1px solid #eaeaea;
    }
    .footer p {
      color: #a1a1aa;
      font-size: 12px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SHHH</h1>
      <p>خزنة الأسرار بدون كلمة مرور</p>
    </div>
    
    <div class="content">
      <h2>{{title}}</h2>
      <p>
        مرحباً <strong>{{name}}</strong>،
      </p>
      
      <div class="alert-box">
        {{message}}
      </div>
      
      <p style="margin-top: 30px; font-size: 14px; color: #71717a;">
        إذا لم تقم بهذا الإجراء، يرجى تأمين حسابك فورًا.
      </p>
    </div>

    <div class="footer">
      <p>لقد تلقيت هذا البريد الإلكتروني لأنك قمت بتفعيل الإشعارات في إعدادات حساب Shhh الخاص بك.</p>
    </div>
  </div>
</body>
</html>
