<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Contact Form Submission</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333333;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid #eaeaea;
    }
    .header {
      background-color: #000000;
      padding: 30px 40px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 24px;
      letter-spacing: 2px;
      font-weight: 700;
    }
    .header p {
      color: #a1a1aa;
      margin: 8px 0 0 0;
      font-size: 14px;
    }
    .content {
      padding: 40px;
    }
    .field {
      margin-bottom: 24px;
    }
    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #71717a;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .value {
      font-size: 16px;
      color: #18181b;
      background-color: #f4f4f5;
      padding: 12px 16px;
      border-radius: 6px;
      margin: 0;
    }
    .message-box {
      font-size: 15px;
      color: #18181b;
      background-color: #f4f4f5;
      padding: 20px;
      border-radius: 6px;
      white-space: pre-wrap;
      margin: 0;
      border-left: 4px solid #000000;
    }
    .footer {
      background-color: #fafafa;
      padding: 20px 40px;
      text-align: center;
      border-top: 1px solid #eaeaea;
    }
    .footer p {
      color: #a1a1aa;
      font-size: 12px;
      margin: 0;
    }
    .badge {
      display: inline-block;
      background-color: #e4e4e7;
      color: #3f3f46;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SHHH</h1>
      <p>The Passwordless Secrets Vault</p>
    </div>
    
    <div class="content">
      <h2 style="margin-top: 0; color: #18181b; font-size: 20px;">New Support Request</h2>
      <p style="color: #71717a; font-size: 15px; margin-bottom: 30px;">
        A user has submitted a new message via the contact form on your website.
      </p>

      <div class="field">
        <div class="label">Sender Details</div>
        <p class="value">
          <strong>{{name}}</strong><br>
          <a href="mailto:{{email}}" style="color: #000000; text-decoration: none;">{{email}}</a>
        </p>
      </div>

      <div class="field">
        <div class="label">Subject</div>
        <p class="value">{{subject}}</p>
      </div>

      <div class="field">
        <div class="label">Message</div>
        <div class="message-box">{{message}}</div>
      </div>
    </div>

    <div class="footer">
      <p>This email was automatically generated from your Shhh contact form.</p>
      <a href="mailto:{{email}}" class="badge">Reply to User</a>
    </div>
  </div>
</body>
</html>
